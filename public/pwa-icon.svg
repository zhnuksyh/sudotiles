<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#211f1c"/>
      <stop offset="60%" stop-color="#151311"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
  </defs>
  <!-- Full-bleed opaque background so the icon is maskable-safe -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Board panel centered within the maskable safe zone (~80%) -->
  <g transform="translate(106 106)">
    <rect x="0" y="0" width="300" height="300" rx="46" fill="#1a1917"/>
    <!-- 3x3 tiles -->
    <g fill="#2a2825">
      <rect x="26" y="26"  width="76" height="76" rx="14"/>
      <rect x="112" y="26" width="76" height="76" rx="14"/>
      <rect x="198" y="26" width="76" height="76" rx="14"/>
      <rect x="26" y="112"  width="76" height="76" rx="14"/>
      <rect x="112" y="112" width="76" height="76" rx="14"/>
      <rect x="198" y="112" width="76" height="76" rx="14"/>
      <rect x="26" y="198"  width="76" height="76" rx="14"/>
      <rect x="112" y="198" width="76" height="76" rx="14"/>
      <rect x="198" y="198" width="76" height="76" rx="14"/>
    </g>
    <!-- A few filled digits for character -->
    <g font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="52" text-anchor="middle">
      <text x="64" y="82"  fill="#ecebe8">5</text>
      <text x="236" y="82" fill="#8f8a82">3</text>
      <text x="150" y="168" fill="#ecebe8">7</text>
      <text x="64" y="254" fill="#8f8a82">2</text>
      <text x="236" y="254" fill="#ecebe8">9</text>
    </g>
  </g>
</svg>
