<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0908; }
  body { font-family: 'Fredoka', sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: #d8d3ca; text-decoration: none; }
  a:hover { color: #ffffff; }
  button { font-family: 'Fredoka', sans-serif; }
  @keyframes st-pop { 0% { transform: scale(0.6); opacity: 0; } 22% { transform: scale(1.08); opacity: 1; } 78% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.02); opacity: 0; } }
  @keyframes st-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes st-rise { from { transform: translateY(14px) scale(0.96); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes st-shake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-9px) rotate(-0.5deg); } 30% { transform: translateX(8px) rotate(0.5deg); } 45% { transform: translateX(-7px); } 60% { transform: translateX(5px); } 75% { transform: translateX(-3px); } 90% { transform: translateX(2px); } }
  @keyframes st-cellpop { 0% { transform: scale(0.4); opacity: 0; } 55% { transform: scale(1.18); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes st-fadeout { from { opacity: 1; } to { opacity: 0; } }
  @keyframes st-fall { from { transform: translateY(0) scale(1); opacity: 1; } to { transform: translateY(14px) scale(0.96); opacity: 0; } }
</style>
</helmet>

<div style="position:relative;min-height:100vh;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;font-family:'Fredoka',sans-serif;background:radial-gradient(135% 105% at 50% 14%, #171614 0%, #100f0e 58%, #0a0908 100%);overflow:hidden;">

  <div style="display:flex;flex-direction:column;align-items:center;gap:20px;animation:{{ shakeAnim }};">

    <!-- TOP HUD -->
    <div style="width:560px;max-width:90vw;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;">
      <div style="display:flex;align-items:center;gap:7px;justify-self:start;">
        <sc-for list="{{ heartsArr }}" as="h" hint-placeholder-count="3">
          <sc-if value="{{ h.filled }}" hint-placeholder-val="{{ true }}">
            <svg width="27" height="27" viewBox="0 0 24 24" style="animation:st-cellpop 0.3s ease-out both;"><path d="M12 21s-7.4-4.7-9.9-9.4C.5 8 2.1 4.6 5.4 4.6c2 0 3.3 1.2 4.1 2.4C10.3 5.8 11.5 4.6 13.5 4.6c3.3 0 4.9 3.4 3.3 7C14.3 16.3 12 21 12 21z" fill="#e0605f"/></svg>
          </sc-if>
          <sc-if value="{{ h.empty }}" hint-placeholder-val="{{ false }}">
            <svg width="27" height="27" viewBox="0 0 24 24"><path d="M12 21s-7.4-4.7-9.9-9.4C.5 8 2.1 4.6 5.4 4.6c2 0 3.3 1.2 4.1 2.4C10.3 5.8 11.5 4.6 13.5 4.6c3.3 0 4.9 3.4 3.3 7C14.3 16.3 12 21 12 21z" fill="none" stroke="#3a3733" stroke-width="1.5"/></svg>
          </sc-if>
        </sc-for>
      </div>
      <div style="display:flex;align-items:flex-start;gap:34px;justify-self:center;">
        <div style="text-align:center;">
          <div style="font-size:11px;letter-spacing:2.5px;color:#7d766c;font-weight:500;">SCORE</div>
          <div style="font-size:32px;font-weight:600;color:#ecebe8;line-height:1.05;">{{ scoreLabel }}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:11px;letter-spacing:2.5px;color:#7d766c;font-weight:500;">TIME</div>
          <div style="font-size:32px;font-weight:600;color:#b3ada3;line-height:1.05;font-variant-numeric:tabular-nums;">{{ timeLabel }}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;justify-self:end;">
        <div style="font-size:11px;letter-spacing:2.5px;color:#7d766c;font-weight:500;">STREAK</div>
        <span style="font-size:32px;font-weight:600;color:#d8d3ca;line-height:1.05;">{{ streak }}</span>
      </div>
    </div>

    <!-- GRID PANEL -->
    <div style="width:560px;max-width:90vw;box-sizing:border-box;padding:16px;border-radius:30px;position:relative;background:linear-gradient(180deg,#1a1917 0%,#121110 100%);box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 34px 60px -22px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);">
      <div style="position:absolute;inset:0;border-radius:30px;pointer-events:none;background:radial-gradient(125% 80% at 50% -12%, rgba(255,255,255,0.05), rgba(255,255,255,0) 52%), radial-gradient(135% 130% at 50% 118%, rgba(0,0,0,0.45), rgba(0,0,0,0) 58%);"></div>
      <sc-if value="{{ pencil }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;inset:0;border-radius:30px;pointer-events:none;z-index:5;box-shadow:0 0 0 2px rgba(224,170,96,0.7) inset;"></div>
      </sc-if>
      <div style="position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:9px;">
        <sc-for list="{{ boxes }}" as="box" hint-placeholder-count="9">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;min-width:0;">
            <sc-for list="{{ box }}" as="cell" hint-placeholder-count="9">
              <div onClick="{{ cell.onClick }}" onContextMenu="{{ cell.onContext }}" style="position:relative;min-width:0;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#211f1d;border-radius:9px;cursor:pointer;transition:background 0.12s ease;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 1px 2px rgba(0,0,0,0.35);" style-hover="background:#2a2825;">
                <sc-if value="{{ cell.isPeer }}" hint-placeholder-val="{{ false }}">
                  <div style="position:absolute;inset:0;border-radius:9px;background:rgba(255,255,255,0.045);"></div>
                </sc-if>
                <sc-if value="{{ cell.isSame }}" hint-placeholder-val="{{ false }}">
                  <div style="position:absolute;inset:0;border-radius:9px;background:rgba(255,255,255,0.12);"></div>
                </sc-if>
                <sc-if value="{{ cell.isError }}" hint-placeholder-val="{{ false }}">
                  <div style="position:absolute;inset:0;border-radius:9px;background:rgba(224,96,96,0.15);"></div>
                </sc-if>
                <sc-if value="{{ cell.isSelected }}" hint-placeholder-val="{{ false }}">
                  <div style="position:absolute;inset:0;border-radius:9px;background:rgba(255,255,255,0.06);box-shadow:0 0 0 2px rgba(216,211,202,0.85) inset;"></div>
                </sc-if>
                <sc-if value="{{ cell.isGiven }}" hint-placeholder-val="{{ false }}">
                  <span style="position:relative;font-size:30px;font-weight:600;color:#ecebe8;">{{ cell.v }}</span>
                </sc-if>
                <sc-if value="{{ cell.isPlayer }}" hint-placeholder-val="{{ false }}">
                  <span style="position:relative;font-size:30px;font-weight:500;color:#9a958d;animation:st-cellpop 0.28s ease-out both;">{{ cell.v }}</span>
                </sc-if>
                <sc-if value="{{ cell.isError }}" hint-placeholder-val="{{ false }}">
                  <span style="position:relative;font-size:30px;font-weight:500;color:#e0605f;animation:st-cellpop 0.28s ease-out both;">{{ cell.v }}</span>
                </sc-if>
                <sc-if value="{{ cell.isScrib }}" hint-placeholder-val="{{ false }}">
                  <div style="position:relative;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%;padding:5px;box-sizing:border-box;">
                    <sc-for list="{{ cell.scribbles }}" as="s" hint-placeholder-count="9">
                      <div style="display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:400;color:#7f7970;line-height:1;">{{ s }}</div>
                    </sc-for>
                  </div>
                </sc-if>
              </div>
            </sc-for>
          </div>
        </sc-for>
      </div>
    </div>

    <!-- NUMBER PAD -->
    <div style="width:560px;max-width:90vw;display:flex;flex-direction:column;gap:12px;">
      <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:8px;">
        <sc-for list="{{ numpad }}" as="n" hint-placeholder-count="9">
          <button onClick="{{ n.onClick }}" onContextMenu="{{ n.onContext }}" style="aspect-ratio:1/1;border:none;border-radius:14px;background:linear-gradient(180deg,#262320 0%,#1c1a17 100%);box-shadow:0 2px 5px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset;font-size:23px;font-weight:500;color:#e4e1db;cursor:pointer;transition:transform 0.1s ease, filter 0.1s ease;" style-hover="transform:translateY(-2px);filter:brightness(1.25);" style-active="transform:translateY(0);filter:brightness(0.9);">{{ n.label }}</button>
        </sc-for>
      </div>
      <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:8px;align-items:stretch;">
        <button onClick="{{ toggleGuides }}" style="grid-column:span 2;border:none;border-radius:14px;padding:11px 6px;background:{{ guideBg }};box-shadow:{{ guideShadow }};font-size:15px;font-weight:500;color:{{ guideColor }};cursor:pointer;white-space:nowrap;transition:transform 0.1s ease, filter 0.1s ease;" style-hover="transform:translateY(-2px);filter:brightness(1.15);" style-active="transform:translateY(0);">Show Guide</button>
        <button onClick="{{ togglePencil }}" title="Scribble" style="grid-column:7;display:flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:11px 0;background:{{ scribBg }};box-shadow:{{ scribShadow }};color:{{ scribColor }};cursor:pointer;transition:transform 0.1s ease, filter 0.1s ease;" style-hover="transform:translateY(-2px);filter:brightness(1.15);" style-active="transform:translateY(0);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </button>
        <button onClick="{{ erase }}" title="Erase" style="display:flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:11px 0;background:linear-gradient(180deg,#242118,#1a1813);box-shadow:0 2px 5px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset;color:#c2bcb2;cursor:pointer;transition:transform 0.1s ease, filter 0.1s ease;" style-hover="transform:translateY(-2px);filter:brightness(1.15);" style-active="transform:translateY(0);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
        </button>
        <button onClick="{{ openDiff }}" title="Difficulty" style="display:flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:11px 0;background:linear-gradient(180deg,#242118,#1a1813);box-shadow:0 2px 5px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset;color:#c2bcb2;cursor:pointer;transition:transform 0.1s ease, filter 0.1s ease;" style-hover="transform:translateY(-2px);filter:brightness(1.15);" style-active="transform:translateY(0);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- CONFETTI CANVAS -->
  <canvas ref="{{ canvasRef }}" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:40;"></canvas>

  <!-- STREAK FLOURISH -->
  <sc-if value="{{ flash }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:45;">
      <div style="animation:st-pop 1.3s ease-out both;display:flex;flex-direction:column;align-items:center;gap:6px;padding:22px 40px;border-radius:24px;background:linear-gradient(180deg,#26241f,#1a1815);box-shadow:0 20px 50px -12px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.08) inset;">
        <span style="font-size:44px;font-weight:700;color:#f0eee9;line-height:1;">{{ flashText }}</span>
        <span style="font-size:14px;font-weight:500;letter-spacing:2px;color:#9a938a;">IN A ROW</span>
      </div>
    </div>
  </sc-if>

  <!-- DIFFICULTY CARD -->
  <sc-if value="{{ diffOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeDiff }}" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);animation:{{ diffBackdropAnim }};">
      <div onClick="{{ stop }}" style="position:relative;animation:{{ diffCardAnim }};display:flex;flex-direction:column;gap:10px;width:320px;max-width:86vw;padding:26px;border-radius:26px;background:linear-gradient(180deg,#201e1b,#161513);box-shadow:0 34px 70px -18px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.05) inset;">
        <button onClick="{{ closeDiff }}" title="Close" style="position:absolute;top:18px;right:18px;display:flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:6px;background:rgba(255,255,255,0.06);color:#b3ada3;cursor:pointer;transition:filter 0.1s ease;" style-hover="filter:brightness(1.5);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"></path></svg>
        </button>
        <div style="font-size:20px;font-weight:600;color:#ecebe8;margin-bottom:6px;">Difficulty</div>
        <sc-for list="{{ difficulties }}" as="d" hint-placeholder-count="4">
          <button onClick="{{ d.onClick }}" style="text-align:left;border:none;border-radius:14px;padding:13px 16px;background:{{ d.bg }};box-shadow:{{ d.shadow }};cursor:pointer;transition:transform 0.1s ease, filter 0.1s ease;display:flex;flex-direction:column;gap:2px;" style-hover="transform:translateY(-1px);filter:brightness(1.12);" style-active="transform:translateY(0);">
            <span style="font-size:17px;font-weight:600;color:{{ d.color }};">{{ d.label }}</span>
            <span style="font-size:12.5px;font-weight:400;color:#8a837a;">{{ d.desc }}</span>
          </button>
        </sc-for>
      </div>
    </div>
  </sc-if>

  <!-- GAME OVER -->
  <sc-if value="{{ over }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,0.62);backdrop-filter:blur(3px);animation:st-fade 0.25s ease-out both;">
      <div style="animation:st-rise 0.3s ease-out both;display:flex;flex-direction:column;align-items:center;gap:14px;padding:38px 46px;border-radius:28px;background:linear-gradient(180deg,#201e1b,#161513);box-shadow:0 34px 70px -18px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.05) inset;">
        <span style="font-size:30px;font-weight:600;color:#ecebe8;">Out of lives</span>
        <span style="font-size:16px;font-weight:400;color:#9a9084;">You scored {{ scoreLabel }} points in {{ timeLabel }}</span>
        <button onClick="{{ restart }}" style="margin-top:6px;border:none;border-radius:16px;padding:14px 30px;background:linear-gradient(180deg,#e5e1d8,#c9c3b8);box-shadow:0 6px 16px -4px rgba(0,0,0,0.5);font-size:18px;font-weight:600;color:#191714;cursor:pointer;transition:transform 0.1s ease;" style-hover="transform:translateY(-2px);" style-active="transform:translateY(0);">Play again</button>
      </div>
    </div>
  </sc-if>

  <!-- SOLVED -->
  <sc-if value="{{ won }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,0.62);backdrop-filter:blur(3px);animation:st-fade 0.25s ease-out both;">
      <div style="animation:st-rise 0.3s ease-out both;display:flex;flex-direction:column;align-items:center;gap:14px;padding:38px 46px;border-radius:28px;background:linear-gradient(180deg,#201e1b,#161513);box-shadow:0 34px 70px -18px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.05) inset;">
        <span style="font-size:30px;font-weight:600;color:#f0eee9;">Solved!</span>
        <span style="font-size:16px;font-weight:400;color:#9a9084;">Final score {{ scoreLabel }} · {{ timeLabel }}</span>
        <button onClick="{{ restart }}" style="margin-top:6px;border:none;border-radius:16px;padding:14px 30px;background:linear-gradient(180deg,#e5e1d8,#c9c3b8);box-shadow:0 6px 16px -4px rgba(0,0,0,0.5);font-size:18px;font-weight:600;color:#191714;cursor:pointer;transition:transform 0.1s ease;" style-hover="transform:translateY(-2px);" style-active="transform:translateY(0);">New puzzle</button>
      </div>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
const GIVENS = [
  "530070000", "600195000", "098000060",
  "800060003", "400803001", "700020006",
  "060000280", "000419005", "000080079"
].join("");
const SOLUTION = [
  "534678912", "672195348", "198342567",
  "859761423", "426853791", "713924856",
  "961537284", "287419635", "345286179"
].join("");
const BASE_POINTS = 100;
const DIFFS = [
  { label: "Easy", desc: "More clues, forgiving pace" },
  { label: "Medium", desc: "A balanced board" },
  { label: "Expert", desc: "Fewer clues to lean on" },
  { label: "Hardcore", desc: "One life, no guides" }
];

class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = this.freshState();
    this.tick = this.tick.bind(this);
    this.confetti = [];
    this.raf = null;
    this.canvasRef = (el) => { this.canvas = el; };
  }

  freshState() {
    const board = [];
    for (let i = 0; i < 81; i++) {
      const given = GIVENS[i] !== "0";
      board.push({
        r: Math.floor(i / 9), c: i % 9,
        given, value: given ? GIVENS[i] : "",
        error: false, scribbles: Array(9).fill(false)
      });
    }
    return {
      board, selected: null, pencil: false, guides: false, started: false,
      hearts: 3, score: 0, streak: 0, elapsed: 0,
      flash: false, flashText: "", over: false, won: false, shakeAnim: "",
      diffOpen: false, diffClosing: false, difficulty: "Medium"
    };
  }

  componentDidMount() { this.timer = setInterval(this.tick, 1000); }
  componentWillUnmount() {
    clearInterval(this.timer);
    if (this.flashT) clearTimeout(this.flashT);
    if (this.shakeT) clearTimeout(this.shakeT);
    if (this.diffT) clearTimeout(this.diffT);
    if (this.raf) cancelAnimationFrame(this.raf);
  }

  tick() {
    this.setState(s => (!s.started || s.over || s.won) ? null : { elapsed: s.elapsed + 1 });
  }

  /* ---------- confetti ---------- */
  fireConfetti(count, originX, originY) {
    const c = this.canvas; if (!c) return;
    const w = c.offsetWidth, h = c.offsetHeight;
    const ox = originX == null ? w / 2 : originX;
    const oy = originY == null ? h * 0.35 : originY;
    const colors = ["#d8d3ca", "#e0605f", "#5ec98a", "#5aa9f0", "#f5e9d0", "#c9a15e"];
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2, sp = 4 + Math.random() * 8;
      this.confetti.push({
        x: ox, y: oy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 5,
        g: 0.14 + Math.random() * 0.1, size: 5 + Math.random() * 7,
        color: colors[i % colors.length], rot: Math.random() * 6,
        vr: (Math.random() - 0.5) * 0.5, life: 0, max: 75 + Math.random() * 45
      });
    }
    if (!this.raf) this.loop();
  }

  loop() {
    const c = this.canvas;
    if (!c) { this.raf = null; return; }
    if (c.width !== c.offsetWidth) c.width = c.offsetWidth;
    if (c.height !== c.offsetHeight) c.height = c.offsetHeight;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    this.confetti = this.confetti.filter(p => p.life < p.max);
    this.confetti.forEach(p => {
      p.life++; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1 - p.life / p.max);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.62);
      ctx.restore();
    });
    if (this.confetti.length) {
      this.raf = requestAnimationFrame(() => this.loop());
    } else {
      ctx.clearRect(0, 0, c.width, c.height);
      this.raf = null;
    }
  }

  shake() {
    if (this.shakeT) clearTimeout(this.shakeT);
    this.setState({ shakeAnim: "st-shake 0.45s ease-in-out" });
    this.shakeT = setTimeout(() => this.setState({ shakeAnim: "" }), 460);
  }

  flourish(text) {
    if (this.flashT) clearTimeout(this.flashT);
    this.setState({ flash: true, flashText: text });
    this.flashT = setTimeout(() => this.setState({ flash: false }), 1300);
    const c = this.canvas;
    this.fireConfetti(90, c ? c.offsetWidth / 2 : null, c ? c.offsetHeight * 0.42 : null);
  }

  /* ---------- interactions ---------- */
  select(i) {
    if (this.state.over || this.state.won) return;
    this.setState({ selected: i });
  }
  togglePencil() { this.setState(s => ({ pencil: !s.pencil })); }
  toggleGuides() { this.setState(s => ({ guides: !s.guides })); }
  openDiff() { this.setState({ diffOpen: true, diffClosing: false }); }
  closeDiff() {
    if (this.diffT) clearTimeout(this.diffT);
    this.setState({ diffClosing: true });
    this.diffT = setTimeout(() => this.setState({ diffOpen: false, diffClosing: false }), 210);
  }
  setDiff(label) { this.setState({ difficulty: label }); this.closeDiff(); }
  stop(e) { e.stopPropagation(); }

  erase() {
    const { selected, over, won } = this.state;
    if (selected == null || over || won) return;
    this.setState(s => {
      const cell = s.board[selected];
      if (cell.given) return null;
      const board = s.board.slice();
      board[selected] = { ...cell, value: "", error: false, scribbles: Array(9).fill(false) };
      return { board };
    });
  }

  scribbleToggle(n) {
    const { selected, over, won } = this.state;
    if (selected == null || over || won) return;
    const cell = this.state.board[selected];
    if (cell.given || cell.value) return;
    this.setState(s => {
      const board = s.board.slice();
      const scribbles = board[selected].scribbles.slice();
      scribbles[n - 1] = !scribbles[n - 1];
      board[selected] = { ...board[selected], scribbles };
      return { board, started: true };
    });
  }

  placeNum(n) {
    if (this.state.pencil) { this.scribbleToggle(n); return; }
    const { selected, over, won } = this.state;
    if (selected == null || over || won) return;
    const cell = this.state.board[selected];
    if (cell.given) return;

    const correct = SOLUTION[selected] === String(n);
    if (correct) {
      let milestone = false, justWon = false;
      this.setState(s => {
        const board = s.board.slice();
        board[selected] = { ...board[selected], value: String(n), error: false, scribbles: Array(9).fill(false) };
        const sr = Math.floor(selected / 9), sc = selected % 9;
        for (let i = 0; i < 81; i++) {
          const b = board[i];
          if (i === selected || b.given || b.value) continue;
          const sameRow = b.r === sr, sameCol = b.c === sc;
          const sameBox = Math.floor(b.r / 3) === Math.floor(sr / 3) && Math.floor(b.c / 3) === Math.floor(sc / 3);
          if ((sameRow || sameCol || sameBox) && b.scribbles[n - 1]) {
            const scr = b.scribbles.slice(); scr[n - 1] = false;
            board[i] = { ...b, scribbles: scr };
          }
        }
        const streak = s.streak + 1;
        const won = board.every(b => b.value !== "" && !b.error);
        justWon = won;
        milestone = streak % 10 === 0 && !won;
        return { board, score: s.score + BASE_POINTS, streak, won, started: true };
      }, () => {
        if (justWon) this.celebrate();
        else if (milestone) this.flourish("+" + this.state.streak + " STREAK");
      });
    } else {
      this.shake();
      this.setState(s => {
        const board = s.board.slice();
        board[selected] = { ...board[selected], value: String(n), error: true, scribbles: Array(9).fill(false) };
        const hearts = s.hearts - 1;
        return { board, hearts, over: hearts <= 0, streak: 0, started: true };
      });
    }
  }

  celebrate() {
    const c = this.canvas; if (!c) return;
    const w = c.offsetWidth, h = c.offsetHeight;
    this.fireConfetti(140, w * 0.5, h * 0.35);
    setTimeout(() => this.fireConfetti(90, w * 0.2, h * 0.45), 200);
    setTimeout(() => this.fireConfetti(90, w * 0.8, h * 0.45), 380);
  }

  restart() {
    if (this.flashT) clearTimeout(this.flashT);
    this.setState(this.freshState());
  }

  /* ---------- render ---------- */
  renderVals() {
    const s = this.state;
    const sel = s.selected;
    const selCell = sel != null ? s.board[sel] : null;
    const selVal = selCell ? selCell.value : "";
    const sr = sel != null ? Math.floor(sel / 9) : -1;
    const sc = sel != null ? sel % 9 : -1;

    const boxes = Array.from({ length: 9 }, () => []);
    s.board.forEach((cell, idx) => {
      const isSelected = idx === sel;
      let isPeer = false, isSame = false;
      if (s.guides && sel != null && !isSelected) {
        const sameRow = cell.r === sr, sameCol = cell.c === sc;
        const sameBox = Math.floor(cell.r / 3) === Math.floor(sr / 3) && Math.floor(cell.c / 3) === Math.floor(sc / 3);
        isPeer = sameRow || sameCol || sameBox;
        if (selVal !== "" && cell.value === selVal) isSame = true;
      }
      const hasVal = cell.value !== "";
      boxes[Math.floor(cell.r / 3) * 3 + Math.floor(cell.c / 3)].push({
        v: cell.value,
        isSelected, isPeer: isPeer && !isSame, isSame,
        isGiven: cell.given,
        isError: hasVal && !cell.given && cell.error,
        isPlayer: hasVal && !cell.given && !cell.error,
        isScrib: !hasVal && cell.scribbles.some(Boolean),
        scribbles: cell.scribbles.map((on, i) => on ? String(i + 1) : ""),
        onClick: () => this.select(idx),
        onContext: (e) => { e.preventDefault(); this.select(idx); }
      });
    });

    const mm = Math.floor(s.elapsed / 60);
    const ss = String(s.elapsed % 60).padStart(2, "0");

    const activeBg = "rgba(224,170,96,0.12)";
    const activeShadow = "0 0 0 2px rgba(224,170,96,0.65) inset";
    const activeColor = "#dcb887";
    const idleBg = "linear-gradient(180deg,#242118,#1a1813)";
    const idleShadow = "0 2px 5px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset";

    return {
      boxes,
      numpad: [1, 2, 3, 4, 5, 6, 7, 8, 9].map(d => ({
        label: String(d),
        onClick: () => this.placeNum(d),
        onContext: (e) => { e.preventDefault(); this.scribbleToggle(d); }
      })),
      heartsArr: [0, 1, 2].map(i => ({ filled: i < s.hearts, empty: i >= s.hearts })),
      scoreLabel: s.score.toLocaleString(),
      timeLabel: mm + ":" + ss,
      streak: s.streak,
      pencil: s.pencil,
      shakeAnim: s.shakeAnim,
      flash: s.flash,
      flashText: s.flashText,
      over: s.over,
      won: s.won,
      diffOpen: s.diffOpen,
      diffBackdropAnim: s.diffClosing ? "st-fadeout 0.2s ease-in both" : "st-fade 0.2s ease-out both",
      diffCardAnim: s.diffClosing ? "st-fall 0.2s ease-in both" : "st-rise 0.28s ease-out both",
      canvasRef: this.canvasRef,
      difficulties: DIFFS.map(d => {
        const active = d.label === s.difficulty;
        return {
          label: d.label, desc: d.desc,
          bg: active ? activeBg : "linear-gradient(180deg,#282520,#1e1b17)",
          shadow: active ? activeShadow : "0 1px 0 rgba(255,255,255,0.04) inset",
          color: active ? activeColor : "#e4e1db",
          onClick: () => this.setDiff(d.label)
        };
      }),
      scribBg: s.pencil ? activeBg : idleBg,
      scribShadow: s.pencil ? activeShadow : idleShadow,
      scribColor: s.pencil ? activeColor : "#c2bcb2",
      scribDot: s.pencil ? "#dcb887" : "#6e685f",
      guideBg: s.guides ? activeBg : idleBg,
      guideShadow: s.guides ? activeShadow : idleShadow,
      guideColor: s.guides ? activeColor : "#c2bcb2",
      togglePencil: () => this.togglePencil(),
      toggleGuides: () => this.toggleGuides(),
      openDiff: () => this.openDiff(),
      closeDiff: () => this.closeDiff(),
      stop: (e) => this.stop(e),
      erase: () => this.erase(),
      restart: () => this.restart()
    };
  }
}
</script>
</body>
</html>
